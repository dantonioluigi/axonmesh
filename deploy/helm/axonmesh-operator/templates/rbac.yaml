{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "axonmesh-operator.fullname" . }}
  labels: {{- include "axonmesh-operator.labels" . | nindent 4 }}
rules:
  # The custom resource and its status.
  - apiGroups: [axonmesh.dev]
    resources: [splitinferences, splitinferences/status]
    verbs: [list, watch, get, patch, update]
  # kopf lists CRDs and namespaces at startup to discover what it watches.
  # Missing these does not stop it outright -- it retries and eventually
  # proceeds -- so the gap hides behind a wall of 403s rather than a crash.
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, watch, get]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list, watch, get]
  # kopf posts events and manages its peering and finalizers.
  - apiGroups: [""]
    resources: [events]
    verbs: [create]
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, patch, get]
  # The objects the operator renders and owns.
  - apiGroups: [""]
    resources: [configmaps, services]
    verbs: [create, get, list, watch, patch, update, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, get, list, watch, patch, update, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [create, get, list, watch, patch, update, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "axonmesh-operator.fullname" . }}
  labels: {{- include "axonmesh-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "axonmesh-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "axonmesh-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
