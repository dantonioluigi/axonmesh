apiVersion: v1
kind: Service
metadata:
  name: {{ include "splitflow-cloud.name" . }}
  labels:
    {{- include "splitflow-cloud.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "splitflow-cloud.selectorLabels" . | nindent 4 }}
  ports:
    - name: wire
      port: {{ .Values.service.port }}
      targetPort: wire
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
