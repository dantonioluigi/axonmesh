image:
  repository: ghcr.io/dantonioluigi/axonmesh-cloud
  tag: ""            # defaults to the chart appVersion
  pullPolicy: IfNotPresent

# Ignored when autoscaling.enabled: the HPA owns the replica count, and
# setting both makes the two fight on every reconcile.
replicaCount: 1

autoscaling:
  # The cloud half's load is the escalation traffic of every edge pointed at
  # it, which moves with the scenes those cameras look at rather than with
  # anything inside the cluster. A fixed count is either waste or a queue, and
  # which one changes during the day.
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

model:
  # URL the initContainer downloads the checkpoint from (any HTTP(S) source).
  # Leave empty and set existingClaim to mount weights from a PVC instead.
  url: ""
  # Expected sha256 of the downloaded file. Strongly recommended: torch.load
  # unpickles the checkpoint, so an unverified URL is remote code execution in
  # the pod. Empty means the file is trusted on faith.
  sha256: ""
  existingClaim: ""
  # Path the server loads inside the pod (don't change unless you know why).
  path: /models/model.pt

bottleneck:
  # Optional trained bottleneck checkpoint (same mechanics as model.url).
  url: ""
  sha256: ""

server:
  port: 9095
  metricsPort: 9090
  imgsz: 640
  cut: ""            # empty = backbone cut chosen automatically
  retrainDir: ""     # e.g. /retrain when mounting a PVC for the hard-frame queue

service:
  type: ClusterIP
  port: 9095
  metricsPort: 9090

serviceMonitor:
  # Requires the Prometheus Operator CRDs.
  enabled: false
  interval: 30s

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    memory: 4Gi

nodeSelector: {}
tolerations: []
affinity: {}
