repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm templates are Go templates, not YAML; the operator manifests
        # ship several resources per file.
        exclude: ^deploy/helm/.*/templates/
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1024]

  # Keep this pinned to the same version CI installs, or the hook rejects code
  # CI accepts (and the reverse) -- ruff moves fast enough for that to happen
  # within one release cycle.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
