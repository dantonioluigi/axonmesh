# Publish the images the charts and the CRD reference.
#
# Without this every `helm install` and every SplitInference in the README ends
# in ImagePullBackOff: the manifests name ghcr.io images that nothing built.
name: images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: axonmesh-cloud
            dockerfile: deploy/docker/Dockerfile.cloud
            context: .
            # The cloud half runs wherever the cluster is; amd64 covers that.
            platforms: linux/amd64
          - name: axonmesh-edge
            dockerfile: deploy/docker/Dockerfile.edge
            context: .
            # The edge is the reason arm64 is here: Jetson, Pi, any device.
            platforms: linux/amd64,linux/arm64
          - name: axonmesh-operator
            dockerfile: operator/Dockerfile
            context: operator
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v3
        if: contains(matrix.platforms, 'arm64')
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          # `latest` only on a tag: a chart that defaults to appVersion should
          # resolve to a release, not to whatever landed on main this morning.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
